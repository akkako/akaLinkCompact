name: akaLink Compact build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install WCH modified GCC toolchain
        run: |
          cd ~
          git clone https://github.com/akkako/riscv-wch-elf-gcc.git
          cd ./riscv-wch-elf-gcc
          tar -Jxf MRS_Toolchain_Linux_x64_V240.tar.xz
          cd Toolchain
          mv "RISC-V Embedded GCC15" "gcc15"

      - name: Build Bootloader
        run: |
          cd firmware/Bootloader
          export PATH=$PATH:~/riscv-wch-elf-gcc/Toolchain/gcc15/bin
          make all -j

      - name: Build Application
        run: |
          cd firmware/Application
          export PATH=$PATH:~/riscv-wch-elf-gcc/Toolchain/gcc15/bin
          make all -j

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            firmware/Application/build_exec/akaLink_Compact_App_pack.bin
            firmware/Bootloader/build_exec/akaLink_Compact_Dfu_pack.bin
      
  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download release
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: releases

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'releases/*'
          allowUpdates: true
          generateReleaseNotes: true
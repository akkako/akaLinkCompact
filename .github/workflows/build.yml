name: akaLink Compact build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install WCH modified GCC toolchain
        uses: akkako/riscv-wch-elf-gcc@v1

      - name: Build Bootloader
        run: |
          cd firmware/Bootloader
          make all -j

      - name: Build Application
        run: |
          cd firmware/Application
          make all -j

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifact
          path: |
            firmware/Application/build_exec/akaLink_Compact_App_pack.bin
            firmware/Bootloader/build_exec/akaLink_Compact_Dfu_pack.bin

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Download release
        uses: actions/download-artifact@v6
        with:
          name: build-artifact
          path: releases

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'releases/*'
          allowUpdates: true
          generateReleaseNotes: true
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>akaLink Tools - GitHub Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CSS 变量定义 - 深色主题（默认） */
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
            --accent-color: #00d4ff;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        /* 浅色主题 */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f0f2f5;
                --bg-secondary: #e4e7eb;
                --bg-card: rgba(255, 255, 255, 0.8);
                --text-primary: #2d3748;
                --text-secondary: #718096;
                --accent-color: #3182ce;
                --border-color: rgba(0, 0, 0, 0.1);
                --shadow-color: rgba(0, 0, 0, 0.1);
            }
        }

        /* 手动主题覆盖 */
        [data-theme="dark"],
        body.dark-theme {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #8892b0;
            --accent-color: #00d4ff;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"],
        body:not(.dark-theme) {
            --bg-primary: #f0f2f5;
            --bg-secondary: #e4e7eb;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --accent-color: #3182ce;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 36px;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 6px 20px var(--shadow-color);
        }

        .theme-toggle:active {
            transform: translateX(-50%) scale(0.95);
        }

        .theme-toggle.animating span {
            animation: themeIconSpin 0.5s ease;
        }

        @keyframes themeIconSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .theme-toggle span {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover span {
            transform: rotate(15deg);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .tool-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--shadow-color);
            border-color: var(--accent-color);
        }

        .tool-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .tool-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .tool-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 28px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .theme-toggle {
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <span id="themeIcon">🌙</span>
    </button>

    <div class="container">
        <h1>akaLink Tools</h1>
        <p class="subtitle">CMSIS-DAP 调试器工具集合</p>

        <div class="tools-grid">
            <a href="hidtool/index.html" class="tool-card">
                <div class="tool-icon">🔧</div>
                <div class="tool-title">HID 调试工具</div>
                <div class="tool-description">
                    通用的 WebHID 调试工具，支持自定义数据发送和接收，适用于各种 HID 设备的调试和测试。
                </div>
            </a>

            <a href="webui/index.html" class="tool-card">
                <div class="tool-icon">⚙️</div>
                <div class="tool-title">akaLink 配置工具</div>
                <div class="tool-description">
                    专为 akaLink CMSIS-DAP 设计的配置工具，支持读取和修改设备配置、查看设备信息、复位和 DFU 模式等功能。
                </div>
            </a>
        </div>

        <div class="footer">
            <p>需要支持 WebHID API 的浏览器（Chrome 89+ / Edge 89+）</p>
            <p style="margin-top: 10px;">
                <a href="https://github.com/akkako/akaLinkCompact" target="_blank">GitHub 仓库</a>
            </p>
        </div>
    </div>

    <script>
        // 主题切换功能
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        // 统一的 localStorage key
        const THEME_KEY = 'akalink-theme';
        
        // 获取保存的主题或检测系统主题
        function getInitialTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme) {
                return savedTheme;
            }
            // 检测系统主题 - 默认深色
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                return 'dark';
            }
            return 'light';
        }

        // 应用主题
        function applyTheme(theme) {
            if (theme === 'light') {
                body.classList.remove('dark-theme');
                themeIcon.textContent = '☀️';
            } else {
                body.classList.add('dark-theme');
                themeIcon.textContent = '🌙';
            }
            localStorage.setItem(THEME_KEY, theme);
        }

        // 切换主题
        function toggleTheme() {
            // 添加动画类
            themeToggle.classList.add('animating');
            
            // 切换主题
            const isDark = body.classList.contains('dark-theme');
            const newTheme = isDark ? 'light' : 'dark';
            applyTheme(newTheme);
            
            // 动画结束后移除动画类
            setTimeout(() => {
                themeToggle.classList.remove('animating');
            }, 500);
        }

        // 初始化
        applyTheme(getInitialTheme());

        // 监听点击
        themeToggle.addEventListener('click', toggleTheme);

        // 监听系统主题变化
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                // 只在用户没有手动设置过主题时自动切换
                if (!localStorage.getItem(THEME_KEY)) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });
        }

        // 监听其他页面修改主题（通过 localStorage 同步）
        window.addEventListener('storage', (e) => {
            if (e.key === THEME_KEY) {
                const newTheme = e.newValue || 'dark';
                applyTheme(newTheme);
            }
        });
    </script>
</body>
</html>
